<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colleague Development Input</title>
<style>
:root {
  --rs-red: #BD3039;
  --rs-red-dark: #8C2128;
  --rs-navy: #0C2340;
  --rs-navy-light: #1A3357;
  --ink: #1a1a1a;
  --ink-soft: #555;
  --ink-mute: #888;
  --line: #e5e7eb;
  --line-soft: #f1f3f5;
  --bg: #fafbfc;
  --card: #ffffff;
  --pill-bg: #f4f5f7;
  --pill-hover: #ebedf0;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lift: 0 4px 12px rgba(12,35,64,0.10), 0 12px 28px rgba(12,35,64,0.08);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* TOPBAR */
.topbar {
  background: var(--rs-navy);
  color: #fff;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 3px solid var(--rs-red);
}
.topbar .crest {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #fff;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.topbar .brand { font-size: 14px; letter-spacing: 0.3px; opacity: 0.95; }
.topbar .brand b { letter-spacing: 0.5px; }
.topbar .brand .sep { opacity: 0.5; margin: 0 6px; }

/* SHELL — fluid width that scales aggressively with viewport.
   Caps at 1200px so wide monitors get a comfortable but not absurd width. */
.shell {
  width: 100%;
  max-width: min(1200px, 94%);
  margin: 0 auto;
  padding: clamp(18px, 3vw, 36px) clamp(14px, 2vw, 32px) 80px;
}
@media (max-width: 600px) {
  .topbar { padding: 12px 16px; }
}

/* STAGE PROGRESS */
.stage-bar { display: flex; gap: 6px; margin-bottom: 22px; }
.stage-bar .pip {
  flex: 1;
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  transition: background 0.2s;
}
.stage-bar .pip.done { background: var(--rs-navy); }
.stage-bar .pip.active { background: var(--rs-red); }

/* CARDS — padding scales with viewport */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: clamp(20px, 3vw, 36px);
  box-shadow: var(--shadow);
}

.eyebrow {
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 700;
  color: var(--rs-red);
  margin-bottom: 8px;
  text-transform: uppercase;
}
h1 { font-size: 26px; margin: 0 0 12px; color: var(--rs-navy); letter-spacing: -0.2px; }
h2 { font-size: 18px; margin: 18px 0 8px; color: var(--rs-navy); letter-spacing: -0.2px; }
h3 { font-size: 15px; margin: 0 0 6px; color: var(--ink); font-weight: 600; }
p { margin: 0 0 14px; color: var(--ink-soft); }
.muted { color: var(--ink-mute); font-size: 13px; }

/* SAFETY COVENANT BOX */
.covenant {
  background: #EDF1F6;
  border-left: 4px solid var(--rs-navy);
  border-radius: 0 8px 8px 0;
  padding: 16px 18px;
  margin: 16px 0 20px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink);
}
.covenant b { color: var(--rs-navy); }

/* FORM FIELDS */
.field { margin-bottom: 22px; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.field .hint {
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 8px;
  line-height: 1.55;
}
.field input[type=text], .field select {
  width: 100%;
  font-family: inherit;
  font-size: 15px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
}
.field input[type=text]:focus, .field select:focus {
  outline: none;
  border-color: var(--rs-navy);
  box-shadow: 0 0 0 3px rgba(12,35,64,0.10);
}

/* Textareas — applied to ALL textareas in the form (both .field and .q-block).
   Generous height by default to encourage longer answers and let the writer see
   what they have said as they go. Resizes vertical if they need more. */
.shell textarea {
  display: block;
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  font-size: 15px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  min-height: 220px;
  resize: vertical;
  line-height: 1.65;
}
.shell textarea.tall { min-height: 280px; }
.shell textarea:focus {
  outline: none;
  border-color: var(--rs-navy);
  box-shadow: 0 0 0 3px rgba(12,35,64,0.10);
}

/* Question block — two-column header / textarea layout */
.q-block {
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line-soft);
}
.q-block:last-of-type { border-bottom: none; padding-bottom: 0; }
.q-block .q-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--rs-navy);
  margin-bottom: 4px;
}
.q-block .q-frame {
  font-size: 12px;
  color: var(--ink-mute);
  font-style: italic;
  margin-bottom: 10px;
  line-height: 1.55;
}

/* Relationship pill row */
.pill-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.pill {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  background: var(--pill-bg);
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: 100px;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.pill:hover { background: var(--pill-hover); }
.pill.selected {
  background: var(--rs-navy);
  color: #fff;
  border-color: var(--rs-navy);
}

/* Likert scale block — sits under each scored textarea.
   1-5 pill row + anchor descriptions. Optional. */
.scale-block {
  margin-top: 14px;
  padding: 14px 16px;
  background: var(--line-soft);
  border-radius: 8px;
}
.scale-block .scale-prompt {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}
.scale-block .scale-prompt .scale-optional {
  font-weight: 500;
  color: var(--ink-mute);
  font-size: 12px;
  margin-left: 6px;
}
.scale-pills-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.scale-num-pill {
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-soft);
  background: #fff;
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  min-width: 42px;
  transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.05s;
}
.scale-num-pill:hover { background: var(--pill-hover); border-color: var(--ink-mute); }
.scale-num-pill:active { transform: translateY(1px); }
.scale-num-pill.selected {
  background: var(--rs-navy);
  color: #fff;
  border-color: var(--rs-navy);
}
.scale-anchors {
  font-size: 11px;
  color: var(--ink-mute);
  font-style: italic;
  line-height: 1.5;
}
.scale-anchors b { color: var(--ink); font-style: normal; font-weight: 700; }

/* NAV BUTTONS */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 28px;
}
.btn {
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  padding: 11px 22px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s, transform 0.05s;
  border: none;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--rs-red); color: #fff; }
.btn-primary:hover { background: var(--rs-red-dark); }
.btn-primary:disabled { background: #c4a8aa; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--pill-bg); }
.btn-link {
  background: transparent;
  color: var(--rs-navy);
  border: none;
  text-decoration: underline;
  font-size: 13px;
  padding: 6px 0;
  cursor: pointer;
}
.btn-big { font-size: 16px; padding: 14px 28px; }

.error-msg {
  color: var(--rs-red);
  font-size: 13px;
  margin-top: 8px;
  font-weight: 600;
}

/* REVIEW SUMMARY */
.summary-section { margin-bottom: 18px; }
.summary-section h4 {
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--rs-red);
  margin: 0 0 8px;
  font-weight: 700;
}
.summary-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  padding: 6px 0;
  font-size: 13px;
  color: var(--ink-soft);
}
.summary-row b { color: var(--ink); font-weight: 600; }
.summary-block {
  margin-bottom: 8px;
  padding: 10px 12px;
  background: var(--line-soft);
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.6;
  font-style: italic;
  color: var(--ink-soft);
}
.summary-empty {
  margin-bottom: 8px;
  padding: 8px 12px;
  color: var(--ink-mute);
  font-size: 12px;
  font-style: italic;
}

/* CONFIRMATION */
.confirm-state { text-align: center; padding: 20px 0; }
.confirm-state .check {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #2e7d32;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 16px;
}

/* DOWNLOAD CONFIRMATION CARD — shows the file that was saved */
.download-confirm {
  background: #E8F5E9;
  border: 1px solid #A5D6A7;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 16px 0 20px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 14px;
}
.download-confirm .dc-icon {
  font-size: 28px;
  flex-shrink: 0;
}
.download-confirm .dc-text { font-size: 13px; color: #1B5E20; line-height: 1.55; }
.download-confirm code {
  display: inline-block;
  background: #fff;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--ink);
  margin-top: 4px;
}

/* STEP LIST — numbered, prominent, text-left */
.step-list { text-align: left; margin: 20px 0; }
.step-item {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 14px;
  align-items: flex-start;
  padding: 14px 0;
  border-bottom: 1px solid var(--line-soft);
}
.step-item:last-child { border-bottom: none; }
.step-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--rs-red);
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.step-item.critical .step-num { background: #ed8c00; }
.step-text { font-size: 14px; line-height: 1.6; color: var(--ink); }
.step-text .step-title { font-weight: 700; color: var(--rs-navy); margin-bottom: 4px; display: block; }
.step-text .step-detail { color: var(--ink-soft); font-size: 13px; }
.step-text code {
  background: var(--line-soft);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--ink);
}
.step-item.critical .step-text .step-title { color: #C76B00; }

/* AUTOSAVE */
.autosave {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--rs-navy);
  color: #fff;
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  box-shadow: var(--shadow-lift);
}
.autosave.show { opacity: 0.95; }

/* RESUME BANNER */
.resume-banner {
  background: #fff8e1;
  border: 1px solid #f5c34b;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #6b4f0c;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.resume-banner button {
  background: #6b4f0c;
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="crest" id="brand-crest">
    <svg width="36" height="36" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-label="Red Sox crest">
      <circle cx="20" cy="20" r="18" fill="#ffffff" stroke="#0C2340" stroke-width="1.5"/>
      <path d="M 7 13 Q 20 20 33 13" fill="none" stroke="#BD3039" stroke-width="1.5" stroke-dasharray="2 2"/>
      <path d="M 7 27 Q 20 20 33 27" fill="none" stroke="#BD3039" stroke-width="1.5" stroke-dasharray="2 2"/>
      <text x="20" y="26" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#BD3039" text-anchor="middle">B</text>
    </svg>
  </div>
  <div class="brand">
    <b id="brand-name">Red Sox</b><span class="sep">·</span>
    <span id="brand-dept">S&amp;C · Player Development</span><span class="sep">·</span>
    <span>Colleague development input</span>
  </div>
</header>

<div class="shell">
  <div id="stage-bar" class="stage-bar"></div>
  <div id="root"></div>
</div>

<div class="autosave" id="autosave">Saved</div>

<script>
//==============================================================================
// CONFIG
//==============================================================================
const BRAND = {
  org: 'Boston Red Sox',
  orgShort: 'Red Sox',
  orgLabel: 'RED SOX',
  dept: 'S&C · Player Development',
  deptShort: 'S&C',
  app: 'Coach Performance & Development Platform',
  primary:        '#BD3039',
  primaryDark:    '#8C2128',
  secondary:      '#0C2340',
  secondaryLight: '#1A3357',
  emailDomain: 'redsox.com',
  emailSender: 'sthomas@redsox.com',
};

//==============================================================================
// STAFF ROSTER — colleagues a reviewer can write feedback about.
// Should match the platform's seed staff list. Update if staffing changes.
//==============================================================================
const STAFF = [
  { id: 'nick-shedd',     name: 'Nick Shedd',      role: 'Director' },
  { id: 'simon-thomas',   name: 'Simon Thomas',    role: 'Coordinator' },
  { id: 'jose-benjamin',  name: 'Jose Benjamin',   role: 'Assistant Coordinator' },
  { id: 'nick-larue',     name: 'Nick LaRue',      role: 'S&C Coach' },
  { id: 'liam-ettinger',  name: 'Liam Ettinger',   role: 'S&C Coach' },
  { id: 'jonah-mondloch', name: 'Jonah Mondloch',  role: 'S&C Coach' },
  { id: 'rowan-amann',    name: 'Rowan Amann',     role: 'S&C Coach' },
  { id: 'dan-rosen',      name: 'Dan Rosen',       role: 'S&C Coach' },
  { id: 'logan-siemers',  name: 'Logan Siemers',   role: 'S&C Coach' },
  { id: 'jp-echeverria',  name: 'JP Echeverria',   role: 'S&C Coach' },
  { id: 'rachel-baldwin', name: 'Rachel Baldwin',  role: 'S&C Coach' },
  { id: 'tj-jackson',     name: 'TJ Jackson',      role: 'S&C Coach' },
  { id: 'ashley-dube',    name: 'Ashley Dube',     role: 'S&C Coach' },
  { id: 'bj-foley',       name: 'BJ Foley',        role: 'S&C Coach' },
  { id: 'jessiah-cruz',   name: 'Jessiah Cruz',    role: 'S&C Coach' },
  { id: 'matt-jones',     name: 'Matt Jones',      role: 'MLB Coach' },
  { id: 'joe-hudson',     name: 'Joe Hudson',      role: 'MLB Coach' },
  { id: 'kiyoshi-momose', name: 'Kiyoshi Momose',  role: 'MLB Coach' },
];

const RELATIONSHIPS = [
  { id: 'daily',        label: 'Daily',        hint: 'I work with them most days' },
  { id: 'weekly',       label: 'Weekly',       hint: 'I work with them most weeks' },
  { id: 'occasionally', label: 'Occasionally', hint: 'I work with them now and then' },
];

//==============================================================================
// STATE
//==============================================================================
const STORAGE_KEY = 'coach_360_v1_draft';
const state = {
  stage: 0,
  reviewer: { firstName: '', lastName: '', name: '', email: '' },
  recipient: { coachId: '', name: '', role: '' },
  relationship: '',
  strengths: { forTeam: '', forMe: '' },
  growth:    { forTeam: '', forMe: '' },
  observedCoaching: { strengths: '', growthAreas: '' },
  scores: {
    strengthsTeam: null,
    strengthsMe:   null,
    growthTeam:    null,
    growthMe:      null,
    ocStrengths:   null,
    ocGrowth:      null,
  },
  blindSpots: '',
  acknowledgments: '',
  submittedAt: null,
  responseId: null,
  deliveredVia: null,
  downloadName: null,
  _lastPayload: null,
};
if (typeof window !== 'undefined') window.state = state;

// Stage order
const STAGES = [
  'welcome',
  'identify',
  'strengths',
  'growth',
  'observed-coaching',
  'blindspots-acks',
  'review',
  'confirm'
];

//==============================================================================
// PERSISTENCE
//==============================================================================
function saveDraft() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      stage: state.stage,
      reviewer: state.reviewer,
      recipient: state.recipient,
      relationship: state.relationship,
      strengths: state.strengths,
      growth: state.growth,
      observedCoaching: state.observedCoaching,
      scores: state.scores,
      blindSpots: state.blindSpots,
      acknowledgments: state.acknowledgments,
    }));
    showAutosave();
  } catch (e) {}
}
function loadDraft() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    Object.assign(state.reviewer, d.reviewer || {});
    Object.assign(state.recipient, d.recipient || {});
    state.relationship = d.relationship || '';
    Object.assign(state.strengths, d.strengths || {});
    Object.assign(state.growth, d.growth || {});
    Object.assign(state.observedCoaching, d.observedCoaching || {});
    Object.assign(state.scores, d.scores || {});
    state.blindSpots = d.blindSpots || '';
    state.acknowledgments = d.acknowledgments || '';
    return (state.reviewer.firstName || state.reviewer.email || state.recipient.coachId);
  } catch (e) { return false; }
}
function clearDraft() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}
let autosaveTimer = null;
function showAutosave() {
  const el = document.getElementById('autosave');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

//==============================================================================
// HELPERS
//==============================================================================
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function applyBrand() {
  document.title = `${BRAND.orgShort} ${BRAND.deptShort} — Colleague development input`;
  document.getElementById('brand-name').textContent = BRAND.orgShort;
  document.getElementById('brand-dept').textContent = BRAND.dept;
}
function firstName(name) { return (name || '').split(/\s+/)[0] || ''; }

//==============================================================================
// LIKERT SCALES — two templates, used across the six scored questions.
// Scores rate the reviewer's experience, not the colleague's ability.
// Coaches see aggregated avg + range across reviewers (computed in dashboard).
//==============================================================================
const SCALE_CONSISTENCY = {
  prompt: 'How consistently do you experience this?',
  anchors: '<b>1</b> rarely &middot; <b>3</b> sometimes &middot; <b>5</b> consistently',
};
const SCALE_IMPACT = {
  prompt: 'How much would more of this benefit the team or your work?',
  anchors: '<b>1</b> marginal &middot; <b>3</b> moderate &middot; <b>5</b> significant uplift',
};
const SCALE_OBSERVED_CONSISTENCY = {
  prompt: 'How consistently do you see this in their coaching?',
  anchors: '<b>1</b> rarely &middot; <b>3</b> sometimes &middot; <b>5</b> consistently',
};
const SCALE_OBSERVED_IMPACT = {
  prompt: 'How much would fine-tuning this benefit their player work?',
  anchors: '<b>1</b> marginal &middot; <b>3</b> moderate &middot; <b>5</b> significant uplift',
};

function renderScale(scoreKey, scaleTemplate) {
  const current = state.scores[scoreKey];
  return `
    <div class="scale-block">
      <div class="scale-prompt">
        ${escapeHtml(scaleTemplate.prompt)}
        <span class="scale-optional">(optional)</span>
      </div>
      <div class="scale-pills-row" role="radiogroup" aria-label="${escapeHtml(scaleTemplate.prompt)}">
        ${[1, 2, 3, 4, 5].map(v => `
          <button type="button" class="scale-num-pill ${current === v ? 'selected' : ''}" data-val="${v}" data-key="${escapeHtml(scoreKey)}" onclick="setScore('${escapeHtml(scoreKey)}', ${v})" aria-checked="${current === v}">${v}</button>
        `).join('')}
      </div>
      <div class="scale-anchors">${scaleTemplate.anchors}</div>
    </div>
  `;
}

function setScore(key, val) {
  // Toggle — clicking the selected pill clears it (lets a reviewer un-score)
  state.scores[key] = (state.scores[key] === val) ? null : val;
  // Update visual selection state without re-rendering the whole page
  document.querySelectorAll(`.scale-num-pill[data-key="${key}"]`).forEach(p => {
    p.classList.toggle('selected', Number(p.dataset.val) === state.scores[key]);
    p.setAttribute('aria-checked', Number(p.dataset.val) === state.scores[key]);
  });
  saveDraft();
}

function goNext() {
  if (state.stage < STAGES.length - 1) {
    state.stage++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    saveDraft();
  }
}
function goPrev() {
  if (state.stage > 0) {
    state.stage--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    saveDraft();
  }
}

//==============================================================================
// SUBMIT
//==============================================================================
function buildPayload() {
  const responseId = `360-${state.recipient.coachId || 'unknown'}-${Date.now().toString(36)}`;
  return {
    schemaVersion: 1,
    kind: '360',
    responseId,
    submittedAt: new Date().toISOString(),
    reviewer: {
      firstName: state.reviewer.firstName,
      lastName: state.reviewer.lastName,
      name: state.reviewer.name,
      email: state.reviewer.email,
    },
    recipient: {
      coachId: state.recipient.coachId,
      name: state.recipient.name,
      role: state.recipient.role,
    },
    relationship: state.relationship || null,
    feedback: {
      strengths: {
        forTeam: state.strengths.forTeam || '',
        forMe:   state.strengths.forMe   || '',
      },
      growth: {
        forTeam: state.growth.forTeam || '',
        forMe:   state.growth.forMe   || '',
      },
      observedCoaching: {
        strengths:   state.observedCoaching.strengths   || '',
        growthAreas: state.observedCoaching.growthAreas || '',
      },
      scores: {
        strengthsTeam: state.scores.strengthsTeam,
        strengthsMe:   state.scores.strengthsMe,
        growthTeam:    state.scores.growthTeam,
        growthMe:      state.scores.growthMe,
        ocStrengths:   state.scores.ocStrengths,
        ocGrowth:      state.scores.ocGrowth,
      },
      blindSpots: state.blindSpots || '',
      acknowledgments: state.acknowledgments || '',
    },
    brand: BRAND.org,
  };
}

function downloadJson(payload, name) {
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 250);
}

function onSubmit() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Preparing…';

  const payload = buildPayload();
  state._lastPayload = payload;
  const safeRec = (payload.recipient.coachId || 'unknown').replace(/[^a-z0-9]+/gi, '-');
  const safeRev = (state.reviewer.email || 'unknown').split('@')[0].replace(/[^a-z0-9]+/gi, '-');
  const filename = `360_${safeRec}_from-${safeRev}_${new Date().toISOString().slice(0,10)}.json`;
  state.downloadName = filename;

  downloadJson(payload, filename);

  state.submittedAt = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  state.responseId = payload.responseId;
  state.deliveredVia = 'json';

  // Clear the draft now that it's been submitted/downloaded
  clearDraft();

  state.stage = STAGES.length - 1;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

  const r = state.reviewer;
  const rec = state.recipient;
  const fb = payload.feedback;
  const lines = [
    `Hi Simon,`, ``,
    `[ Before sending: please attach the file "${state.downloadName || 'development-input.json'}" from your Downloads folder. It is required for the Coordinator to import this input into the dashboard. ]`, ``,
    `Reviewer:     ${r.name} <${r.email}>`,
    `Supporting:   ${rec.name} (${rec.role})`,
    `Relationship: ${state.relationship || 'not specified'}`,
    `Response ID: ${payload.responseId}`, ``,
    `(Plain-text backup of the JSON below, in case the attachment didn't come through.)`, ``,
    `---BEGIN JSON---`,
    JSON.stringify(payload, null, 2),
    `---END JSON---`, ``,
    `Thanks,`, `${r.name}`,
  ];
  return lines.join('\n');
}

function emailToCoordinator() {
  const payload = state._lastPayload;
  if (!payload) {
    alert('Your responses are no longer in memory. Re-download the file and email it manually to ' + BRAND.emailSender);
    return;
  }
  const subject = `Development input — supporting ${state.recipient.name}`;
  const body = buildEmailBody(payload);
  const mailto = `mailto:${encodeURIComponent(BRAND.emailSender)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  if (mailto.length > 1900) {
    const shortBody = body.split('---BEGIN JSON---')[0] + '\n(Attachment was too large to inline. The JSON file is attached.)\n\nThanks,\n' + state.reviewer.name;
    const shortMailto = `mailto:${encodeURIComponent(BRAND.emailSender)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(shortBody)}`;
    window.location.href = shortMailto;
  } else {
    window.location.href = mailto;
  }
}

//==============================================================================
// MAIN RENDER
//==============================================================================
function renderStageBar() {
  // Welcome and confirm are not counted as steps
  const numSteps = STAGES.length - 2;
  const currentStep = state.stage === 0 ? 0 : (state.stage === STAGES.length - 1 ? numSteps + 1 : state.stage);
  const pips = [];
  for (let i = 1; i <= numSteps; i++) {
    let cls = '';
    if (i < currentStep) cls = 'done';
    else if (i === currentStep) cls = 'active';
    pips.push(`<div class="pip ${cls}"></div>`);
  }
  document.getElementById('stage-bar').innerHTML = pips.join('');
}

function render() {
  const stageKey = STAGES[state.stage];
  let html = '';
  if (stageKey === 'welcome')          html = renderWelcome();
  else if (stageKey === 'identify')    html = renderIdentify();
  else if (stageKey === 'strengths')   html = renderStrengths();
  else if (stageKey === 'growth')      html = renderGrowth();
  else if (stageKey === 'observed-coaching') html = renderObservedCoaching();
  else if (stageKey === 'blindspots-acks') html = renderBlindspotsAcks();
  else if (stageKey === 'review')      html = renderReview();
  else if (stageKey === 'confirm')     html = renderConfirm();
  document.getElementById('root').innerHTML = html;
  renderStageBar();
}

//==============================================================================
// INIT
//==============================================================================
if (typeof window !== 'undefined') window.state = state;

applyBrand();

const hadDraft = loadDraft();
if (hadDraft) {
  const banner = document.createElement('div');
  banner.className = 'resume-banner';
  banner.innerHTML = `
    <span><b>Welcome back.</b> We found a draft in progress &mdash; pick up where you left off?</span>
    <div>
      <button onclick="this.parentElement.parentElement.remove(); render();">Resume</button>
      <button onclick="if(confirm('Discard the saved draft and start over?')) { clearDraft(); location.reload(); }" style="background: transparent; color: #6b4f0c; border: 1px solid #6b4f0c; margin-left: 6px;">Start over</button>
    </div>
  `;
  document.querySelector('.shell').insertBefore(banner, document.getElementById('stage-bar'));
}
render();
</script>
</body>
</html>
